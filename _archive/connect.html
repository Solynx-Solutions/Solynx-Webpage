<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Connect | SOLYNX</title>

<meta name="description" content="Connect with SOLYNX — Strategic consulting, automation systems, and AI infrastructure designed to help businesses scale.">

<link rel="stylesheet" href="styles-new.css">

<style>

body{
background:#0b0f1a;
color:white;
font-family:system-ui;
}

.connect-wrap{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
min-height:90vh;
text-align:center;
padding:40px 20px;
}

.connect-logo{
max-width:220px;
margin-bottom:30px;
}

.connect-title{
font-size:2.2rem;
margin-bottom:15px;
}

.connect-sub{
font-size:1.1rem;
max-width:550px;
opacity:.85;
margin-bottom:35px;
}

.connect-buttons{
display:flex;
flex-direction:column;
gap:16px;
width:100%;
max-width:320px;
}

.connect-btn{
padding:14px 18px;
border-radius:8px;
font-weight:600;
text-decoration:none;
transition:.2s;
}

.primary{
background:linear-gradient(90deg,#00eaff,#0066ff);
color:white;
}

.secondary{
border:1px solid rgba(255,255,255,.3);
color:white;
}

.connect-btn:hover{
transform:translateY(-2px);
}

</style>

</head>

<body>

<div class="connect-wrap">

<img src="assets/images/solynx-logo.png" class="connect-logo">

<h1 class="connect-title">Connect with SOLYNX</h1>

<p class="connect-sub">
Strategic consulting and automation infrastructure designed to help businesses scale smarter.
</p>

<div class="connect-buttons">

<a href="https://solynx.solutions/#contact" class="connect-btn primary">
Book a Consultation
</a>

<a href="https://www.linkedin.com/company/solynx" class="connect-btn secondary">
Follow on LinkedIn
</a>

<a href="mailto:info@solynx.solutions" class="connect-btn secondary">
Email SOLYNX
</a>

</div>

</div>

</body>
</html>
