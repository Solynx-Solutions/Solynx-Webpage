<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Connect | SOLYNX</title>

<meta name="description" content="Connect with SOLYNX. Schedule a consultation, explore solutions, and start scaling your business.">

<link rel="stylesheet" href="styles-new.css">

<style>

.connect-container{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
min-height:80vh;
text-align:center;
padding:40px 20px;
}

.connect-logo{
max-width:220px;
margin-bottom:30px;
}

.connect-title{
font-size:2.2rem;
margin-bottom:15px;
}

.connect-sub{
font-size:1.1rem;
max-width:600px;
margin-bottom:35px;
opacity:.85;
}

.connect-buttons{
display:flex;
flex-direction:column;
gap:15px;
max-width:320px;
width:100%;
}

.connect-btn{
padding:14px 20px;
border-radius:8px;
text-decoration:none;
font-weight:600;
transition:.2s;
}

.connect-primary{
background:linear-gradient(90deg,#00eaff,#0077ff);
color:white;
}

.connect-secondary{
border:1px solid rgba(255,255,255,.3);
color:white;
}

.connect-btn:hover{
transform:translateY(-2px);
}

</style>

</head>

<body>

<div class="connect-container">

<img src="assets/images/solynx-logo.png" class="connect-logo" alt="SOLYNX">

<h1 class="connect-title">Connect with SOLYNX</h1>

<p class="connect-sub">
Strategic consulting, automation systems, and AI-powered infrastructure designed to help businesses scale smarter.
</p>

<div class="connect-buttons">

<a href="https://solynx.solutions/#contact" class="connect-btn connect-primary">
Book a Consultation
</a>

<a href="https://www.linkedin.com/company/solynx" class="connect-btn connect-secondary">
Connect on LinkedIn
</a>

<a href="mailto:info@solynx.solutions" class="connect-btn connect-secondary">
Email SOLYNX
</a>

</div>

</div>

</body>
</html>
