<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Connect | SOLYNX</title>

<meta name="description"
content="Connect with SOLYNX — Strategic consulting, automation systems, and AI infrastructure designed to help businesses scale.">

<link rel="stylesheet" href="../styles-new.css">

<style>

body{
background:#0b0f1a;
color:white;
font-family:system-ui;
margin:0;
}

.connect-wrap{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
min-height:100vh;
text-align:center;
padding:40px 20px;
}

.logo{
max-width:220px;
margin-bottom:30px;
}

.title{
font-size:2.4rem;
margin-bottom:15px;
}

.subtitle{
max-width:600px;
opacity:.85;
margin-bottom:35px;
}

.buttons{
display:flex;
flex-direction:column;
gap:16px;
width:100%;
max-width:320px;
}

.btn{
padding:14px 20px;
border-radius:8px;
font-weight:600;
text-decoration:none;
transition:.2s;
}

.primary{
background:linear-gradient(90deg,#00eaff,#0077ff);
color:white;
}

.secondary{
border:1px solid rgba(255,255,255,.3);
color:white;
}

.btn:hover{
transform:translateY(-2px);
}

</style>

</head>

<body>

<div class="connect-wrap">

<img src="../assets/images/solynx-logo.png" class="logo">

<h1 class="title">Connect with SOLYNX</h1>

<p class="subtitle">
Strategic consulting and automation infrastructure designed to help businesses scale smarter.
</p>

<div class="buttons">

<a href="https://solynx.solutions/#contact" class="btn primary">
Book a Consultation
</a>

<a href="https://www.linkedin.com/company/solynx" class="btn secondary">
Follow on LinkedIn
</a>

<a href="mailto:info@solynx.solutions" class="btn secondary">
Email SOLYNX
</a>

</div>

</div>

</body>
</html>
