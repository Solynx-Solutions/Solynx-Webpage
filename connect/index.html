<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Connect | SOLYNX</title>

<meta name="description"
content="Connect with SOLYNX — Strategic consulting, automation systems, and AI infrastructure designed to help businesses scale.">

<link rel="stylesheet" href="../styles-new.css">

<style>

body{
background:#0b0f1a;
color:white;
font-family:system-ui, -apple-system, sans-serif;
margin:0;
overflow-x:hidden;
}

/* animated background glow */

body::before{
content:"";
position:fixed;
top:-50%;
left:-50%;
width:200%;
height:200%;
background:radial-gradient(circle at center,#00e1ff22,transparent 60%);
animation:glowMove 18s linear infinite;
z-index:-1;
}

@keyframes glowMove{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

.connect-wrap{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
min-height:100vh;
text-align:center;
padding:40px 20px;
}

.logo{
width:140px;
animation:solynxGlow 2.8s ease-in-out infinite alternate;
}

@keyframes solynxGlow{
0%{
filter:drop-shadow(0 0 6px #00e1ff44)
drop-shadow(0 0 12px #00e1ff44);
}

100%{
filter:drop-shadow(0 0 16px #00e1ff)
drop-shadow(0 0 34px #00e1ff);
}
}

.title{
font-size:2.2rem;
margin-bottom:10px;
letter-spacing:1px;
}

.subtitle{
opacity:.8;
max-width:500px;
margin-bottom:40px;
}

.buttons{
display:flex;
flex-direction:column;
gap:14px;
width:100%;
max-width:320px;
}

.btn{
display:block;
padding:14px;
border-radius:8px;
text-decoration:none;
font-weight:600;
transition:.25s;
}

.primary{
background:#00e1ff;
color:#001018;
}

.primary:hover{
background:#39edff;
transform:translateY(-2px);
}

.secondary{
background:#1c2336;
color:white;
border:1px solid #2e3b5e;
}

.secondary:hover{
background:#283354;
}

</style> 

</head>

<body>

<div class="connect-wrap">

<img src="/assets/images/solynx-logo-v2.png" class="logo">

<h1 class="title">Rafael Solano</h1>

<p class="subtitle">
Founder • SOLYNX LLC
</p>

<p class="subtitle">
Strategic consulting and automation infrastructure designed to help businesses scale smarter.
</p>

<div class="buttons">

<a href="/connect/rafael-solynx.vcf" class="btn primary">
Save Contact
</a>

<a href="tel:2094701307" class="btn secondary">
Call Rafael
</a>

<a href="tel:8554085969" class="btn secondary">
Call SOLYNX Office
</a>

<a href="https://solynx.solutions/#contact" class="btn primary">
Book a Consultation
</a>

<a href="https://www.linkedin.com/company/solynx-llc/" class="btn secondary" target="_blank">
Follow SOLYNX on LinkedIn
</a>

<a href="mailto:info@solynx.solutions" class="btn secondary">
Email SOLYNX
</a>

</div>

</div>

</body>
</html>
